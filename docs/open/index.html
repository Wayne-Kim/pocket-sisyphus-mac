<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="robots" content="noindex" />
  <title>Open in Pocket Sisyphus</title>
  <!--
    Static deep-link bridge for Discord notifications.

    Why this page exists: Discord (unlike Slack) refuses to linkify custom URL
    schemes — `pocketsisyphus://session/<id>` is dead plain text there, and the
    masked-link / button APIs reject any non-(http/https/discord) scheme. So the
    daemon's Discord notifier instead posts an https link to THIS page, which
    Discord does linkify; the page then hands off to the app's custom scheme.

    No server, no secrets: the session id lives only in the URL fragment
    (`#<id>`, never sent over the network) and is used solely to build the
    `pocketsisyphus://` URL on the client. One canonical page serves every build.

    Discord iOS opens links in an in-app Safari modal that bypasses Universal
    Links — but a custom-scheme redirect still works there (it prompts "Open in
    Pocket Sisyphus?"), which is exactly why a redirect page beats AASA here.
  -->
  <style>
    :root { color-scheme: light dark; }
    html, body { height: 100%; margin: 0; }
    body {
      font: 16px/1.5 -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      display: flex; align-items: center; justify-content: center;
      background: #0b0d12; color: #e6e8ee;
    }
    main {
      max-width: 22rem; padding: 2rem 1.5rem; text-align: center;
    }
    h1 { font-size: 1.25rem; margin: 0 0 0.75rem; }
    p { margin: 0.5rem 0; color: #aab1c2; }
    .btn {
      display: inline-block; margin-top: 1rem; padding: 0.7rem 1.4rem;
      border-radius: 0.7rem; background: #5865f2; color: #fff;
      text-decoration: none; font-weight: 600;
    }
    .hint { font-size: 0.85rem; margin-top: 1.25rem; }
    code { background: rgba(255,255,255,0.08); padding: 0.1em 0.35em; border-radius: 0.3em; }
  </style>
</head>
<body>
  <main>
    <h1>Pocket Sisyphus</h1>
    <p id="status">Opening the session in the app…</p>
    <a id="open" class="btn" href="#">Open session</a>
    <p class="hint">If nothing happens, make sure the Pocket Sisyphus app is installed, then tap the button above.</p>
  </main>
  <script>
    (function () {
      // Session id from the fragment (preferred — never leaves the browser) or ?s=.
      function readId() {
        var h = (location.hash || "").replace(/^#/, "");
        if (h) return h;
        var m = location.search.match(/[?&]s=([^&]+)/);
        return m ? decodeURIComponent(m[1]) : "";
      }
      // Session ids are UUID-ish; allow only safe chars to block scheme/URL injection.
      var raw = readId();
      var id = (raw.match(/[A-Za-z0-9._-]+/) || [""])[0];

      var statusEl = document.getElementById("status");
      var openEl = document.getElementById("open");

      if (!id) {
        statusEl.textContent = "No session specified.";
        openEl.style.display = "none";
        return;
      }

      var target = "pocketsisyphus://session/" + encodeURIComponent(id);
      openEl.setAttribute("href", target);

      // Auto-hand off to the app. If it isn't installed the navigation fails
      // harmlessly and this page (with the manual button) stays visible.
      try { location.replace(target); } catch (e) { /* button fallback */ }
    }());
  </script>
</body>
</html>
